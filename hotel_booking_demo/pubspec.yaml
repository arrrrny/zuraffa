name: hotel_booking_demo
description: "A comprehensive hotel booking system demo showcasing Zuraffa's Clean Architecture capabilities."

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter

  # Zuraffa Framework and Core Dependencies
  zuraffa:
    path: ../
  zorphy:
    path: ../../zorphy/zorphy
  zorphy_annotation:
    path: ../../zorphy/zorphy_annotation

  # Dependency Injection
  get_it: ^9.2.1

  # Navigation
  go_router: ^17.1.0

  # Local Storage for Mock Data
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.5

  # HTTP Client
  http: ^1.6.0

  # JSON Annotation
  json_annotation: ^4.9.0

  # UUID Generation
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.11.0
  json_serializable: ^6.13.1

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^4.0.0

dependency_overrides:
  meta: ^1.18.0
  analyzer: ^12.0.0

flutter:
  uses-material-design: true

  # Assets for the hotel booking demo
  assets:
    - assets/images/
    - assets/icons/
