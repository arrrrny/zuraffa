name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-13
            platform: macos
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build MCP Server
        run: |
          mkdir -p build/raw
          dart build cli --target=bin/zuraffa_mcp_server.dart -o build/mcp_server_raw

      - name: Build CLI
        run: |
          dart build cli --target=bin/zfa.dart -o build/zfa_raw

      - name: Prepare Binaries (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          # Use the tag name for the version
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="${{ matrix.platform }}-${{ matrix.arch }}"
          
          # Gzip directly for Zed
          gzip -c build/mcp_server_raw/bundle > "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION.gz"
          gzip -c build/zfa_raw/bundle > "zfa-$PLATFORM_TAG-v$VERSION.gz"
          
          # Create traditional tarballs too
          cp build/mcp_server_raw/bundle "zuraffa_mcp_server"
          cp build/zfa_raw/bundle "zfa"
          tar -czf "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION.tar.gz" "zuraffa_mcp_server"
          tar -czf "zfa-$PLATFORM_TAG-v$VERSION.tar.gz" "zfa"

      - name: Prepare Binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="windows-x64"
          
          # Rename for clarity
          cp build/mcp_server_raw/bundle.exe "zuraffa_mcp_server.exe"
          cp build/zfa_raw/bundle.exe "zfa.exe"
          
          # Zip for Windows users
          7z a "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION.zip" "zuraffa_mcp_server.exe"
          7z a "zfa-$PLATFORM_TAG-v$VERSION.zip" "zfa.exe"
          
          # Also keep raw exe for Zed (Windows Zed might support .exe directly or .zip)
          # We provide both for flexibility
          cp "zuraffa_mcp_server.exe" "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION.exe"
          cp "zfa.exe" "zfa-$PLATFORM_TAG-v$VERSION.exe"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.gz
            *.tar.gz
            *.zip
            *.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
