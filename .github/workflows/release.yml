name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ""
          - os: macos-14
            platform: macos
            arch: x64
            ext: ""
          - os: windows-latest
            platform: windows
            arch: x64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Build MCP Server
        run: flutter pub run build_runner build --delete-conflicting-outputs || dart build cli --target=bin/zuraffa_mcp_server.dart -o build/mcp

      - name: Build CLI
        run: dart build cli --target=bin/zfa.dart -o build/cli

      - name: Prepare raw binaries for Zed
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="${{ matrix.platform }}-${{ matrix.arch }}"

          # Raw binary for Zed (uncompressed)
          cp build/mcp/bundle/bin/zuraffa_mcp_server${{ matrix.ext }} "zuraffa_mcp_server-$PLATFORM_TAG${{ matrix.ext }}"
          cp build/cli/bundle/bin/zfa${{ matrix.ext }} "zfa-$PLATFORM_TAG${{ matrix.ext }}"

          chmod +x "zuraffa_mcp_server-$PLATFORM_TAG${{ matrix.ext }}" "zfa-$PLATFORM_TAG${{ matrix.ext }}"

      - name: Prepare archives for users
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="${{ matrix.platform }}-${{ matrix.arch }}"

          cp -r build/mcp/bundle "zuraffa_mcp_server"
          cp -r build/cli/bundle "zfa"

          tar -czf "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION.tar.gz" zuraffa_mcp_server
          tar -czf "zfa-$PLATFORM_TAG-v$VERSION.tar.gz" zfa

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zuraffa_mcp_server-${{ matrix.platform }}-${{ matrix.arch }}*
            zfa-${{ matrix.platform }}-${{ matrix.arch }}*
          tag_name: ${{ github.ref }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
