name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
            ext: ""
            exe: ""
            tar_ext: .tar.gz
          - os: macos-13
            platform: macos
            arch: x64
            ext: ""
            exe: ""
            tar_ext: .tar.gz
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
            exe: ""
            tar_ext: .tar.gz
          - os: windows-latest
            platform: windows
            arch: x64
            ext: .exe
            exe: .exe
            tar_ext: .zip

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install deps
        run: dart pub get

      - name: Build MCP Server
        run: dart build cli --target=bin/zuraffa_mcp_server.dart -o build/mcp

      - name: Build CLI
        run: dart build cli --target=bin/zfa.dart -o build/cli

      - name: Prepare raw binaries for Zed
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="${{ matrix.platform }}-${{ matrix.arch }}"

          # Raw binary for Zed (uncompressed) - exact name Zed expects
          cp build/mcp/bundle/bin/zuraffa_mcp_server${{ matrix.ext }} "zuraffa_mcp_server-$PLATFORM_TAG${{ matrix.ext }}"
          cp build/cli/bundle/bin/zfa${{ matrix.ext }} "zfa-$PLATFORM_TAG${{ matrix.ext }}"

          chmod +x "zuraffa_mcp_server-$PLATFORM_TAG${{ matrix.ext }}" "zfa-$PLATFORM_TAG${{ matrix.ext }}"

      - name: Prepare archives for users
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM_TAG="${{ matrix.platform }}-${{ matrix.arch }}"

          # tar.gz / zip archives
          cp -r build/mcp/bundle "zuraffa_mcp_server"
          cp -r build/cli/bundle "zfa"

          tar -czf "zuraffa_mcp_server-$PLATFORM_TAG-v$VERSION${{ matrix.tar_ext }}" zuraffa_mcp_server
          tar -czf "zfa-$PLATFORM_TAG-v$VERSION${{ matrix.tar_ext }}" zfa

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zuraffa_mcp_server-${{ matrix.platform }}-${{ matrix.arch }}*
            zfa-${{ matrix.platform }}-${{ matrix.arch }}*
          tag_name: ${{ github.ref }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
