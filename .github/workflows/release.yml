name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: macos-14
            platform: macos
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x64

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v1
        with:
          flutter-version: "3.41.0"

      - name: Install deps
        run: flutter pub get

      - name: Build MCP Server
        run: dart build cli --target=bin/zuraffa_mcp_server.dart -o build/mcp

      - name: Build CLI
        run: dart build cli --target=bin/zfa.dart -o build/cli

      - name: Prepare binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLATFORM="${{ matrix.platform }}-${{ matrix.arch }}"
          EXT="${{ matrix.platform == 'windows' && '.exe' || '' }}"

          # Raw binaries for Zed
          cp build/mcp/bundle/bin/zuraffa_mcp_server$EXT "zuraffa_mcp_server-$PLATFORM$EXT"
          cp build/cli/bundle/bin/zfa$EXT "zfa-$PLATFORM$EXT"
          chmod +x "zuraffa_mcp_server-$PLATFORM$EXT" "zfa-$PLATFORM$EXT"

          # Archives for users
          cp -r build/mcp/bundle zuraffa_mcp_server
          cp -r build/cli/bundle zfa
          tar -czf "zuraffa_mcp_server-$PLATFORM-v$VERSION.tar.gz" zuraffa_mcp_server
          tar -czf "zfa-$PLATFORM-v$VERSION.tar.gz" zfa

      - name: Set output path
        id: paths
        run: |
          PLATFORM="${{ matrix.platform }}-${{ matrix.arch }}"
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "files_to_upload=zuraffa_mcp_server-$PLATFORM*,zfa-$PLATFORM*" >> $GITHUB_OUTPUT

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.paths.outputs.files_to_upload }}
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update the Zed extension in the zed-industries/extensions monorepo.
  # This creates a PR in your fork (arrrrny/extensions) with the new submodule
  # SHA and updated version in extensions.toml.
  #
  # Prerequisites:
  #   1. Fork https://github.com/zed-industries/extensions to arrrrny/extensions
  #   2. Add extensions/mcp-server-zuraffa/ as a submodule in that fork pointing
  #      to a repo that contains extension.toml + extension.wasm at its root
  #   3. Add a [mcp-server-zuraffa] version entry in extensions.toml in that fork
  #   4. Create a PAT (repo + workflow scopes) and save it as COMMITTER_TOKEN
  #      in the repo secrets
  update-zed-extension:
    name: Update Zed Extension
    runs-on: ubuntu-latest
    needs: build
    if: secrets.COMMITTER_TOKEN != ''
    steps:
      - uses: huacnlee/zed-extension-action@v2
        with:
          extension-name: mcp-server-zuraffa
          push-to: arrrrny/extensions
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
