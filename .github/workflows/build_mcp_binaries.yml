name: Build MCP Server Binaries

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos-arm64
            output: zuraffa_mcp_server-macos-arm64
            cli_output: zfa-macos-arm64
          - os: macos-13
            platform: macos-x64
            output: zuraffa_mcp_server-macos-x64
            cli_output: zfa-macos-x64
          - os: ubuntu-latest
            platform: linux-x64
            output: zuraffa_mcp_server-linux-x64
            cli_output: zfa-linux-x64
          - os: windows-latest
            platform: windows-x64
            output: zuraffa_mcp_server-windows-x64.exe
            cli_output: zfa-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build MCP server binary
        run: dart build cli --target=bin/zuraffa_mcp_server.dart -o build_mcp

      - name: Build CLI binary
        run: dart build cli --target=bin/zfa.dart -o build_cli

      - name: Extract raw binaries for Zed extension (Unix)
        if: runner.os != 'Windows'
        run: |
          cp build_mcp/bundle/bin/zuraffa_mcp_server ${{ matrix.output }}
          cp build_cli/bundle/bin/zfa ${{ matrix.cli_output }}
          chmod +x ${{ matrix.output }} ${{ matrix.cli_output }}

      - name: Extract raw binaries for Zed extension (Windows)
        if: runner.os == 'Windows'
        run: |
          copy build_mcp\bundle\bin\zuraffa_mcp_server.exe ${{ matrix.output }}
          copy build_cli\bundle\bin\zfa.exe ${{ matrix.cli_output }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.output }}.tar.gz -C build_mcp bundle
          tar -czf ${{ matrix.cli_output }}.tar.gz -C build_cli bundle

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive -Path build_mcp/bundle -DestinationPath ${{ matrix.output }}.zip
          powershell Compress-Archive -Path build_cli/bundle -DestinationPath ${{ matrix.cli_output }}.zip

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            *.tar.gz
            *.zip
            ${{ matrix.output }}
            ${{ matrix.cli_output }}

      - name: Upload MCP raw binary to release (Unix)
        if: github.event_name == 'release' && runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}
          asset_name: ${{ matrix.output }}
          asset_content_type: application/octet-stream

      - name: Upload CLI raw binary to release (Unix)
        if: github.event_name == 'release' && runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.cli_output }}
          asset_name: ${{ matrix.cli_output }}
          asset_content_type: application/octet-stream

      - name: Upload MCP tar.gz to release (Unix)
        if: github.event_name == 'release' && runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}.tar.gz
          asset_name: ${{ matrix.output }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload CLI tar.gz to release (Unix)
        if: github.event_name == 'release' && runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.cli_output }}.tar.gz
          asset_name: ${{ matrix.cli_output }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload MCP raw binary to release (Windows)
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}
          asset_name: ${{ matrix.output }}
          asset_content_type: application/octet-stream

      - name: Upload CLI raw binary to release (Windows)
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.cli_output }}
          asset_name: ${{ matrix.cli_output }}
          asset_content_type: application/octet-stream

      - name: Upload MCP zip to release (Windows)
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.output }}.zip
          asset_name: ${{ matrix.output }}.zip
          asset_content_type: application/zip

      - name: Upload CLI zip to release (Windows)
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./${{ matrix.cli_output }}.zip
          asset_name: ${{ matrix.cli_output }}.zip
          asset_content_type: application/zip
