name: zuraffa
description: AI first Flutter Clean Architecture Framework and CLI with Result types, UseCase patterns, Dependency Injection and MCP server for building type-safe, scalable apps with AI agents.
version: 4.0.9
homepage: https://zuraffa.com
repository: https://github.com/arrrrny/zuraffa
issue_tracker: https://github.com/arrrrny/zuraffa/issues
documentation: https://github.com/arrrrny/zuraffa#readme

topics:
  - clean-architecture
  - state-management
  - dependency-injection
  - architecture
  - code-generation

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  args: ^2.7.0
  logging: ^1.3.0
  path: ^1.9.1
  provider: ^6.1.5+1
  responsive_builder: ^0.7.1
  uuid: ^4.5.2
  zorphy: ^1.6.7
  zorphy_annotation: ^1.6.7
  json_annotation: ^4.11.0

  http: ^1.6.0
  minio: ^3.5.8
  go_router: ^17.2.0
  opentelemetry: ^0.18.11
  code_builder: ^4.11.1
  dart_style: ^3.1.5
  analyzer: ^12.0.0

  json_serializable: ^6.13.1
  get_it: ^9.2.1
  meta: ^1.18.0
  get: ^4.7.3
  hive_ce_generator: ^1.11.1
  glob: ^2.1.2
  hive_ce: ^2.3.4
  hive_ce_flutter: ^2.3.4

dependency_overrides:
  meta: ^1.18.0
  analyzer: ^12.0.0

executables:
  zuraffa:
  zfa:
  zuraffa_mcp_server:

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
